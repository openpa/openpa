[general]
service_name = "openpa-agent"
agent_id = "openpa_agent"
agent_name = "OPENPA Agent"
jwt_expiration_hours = 720
session_token_default_ttl = 3600
mcp_tool_call_timeout = 300
working_dir = "~/.openpa"
sqlite_db_path = "openpa.db"
profile = ""

[embedding]
grpc_host = "localhost"
grpc_port = 50051

[qdrant]
host = "localhost"
port = 6333
api_key = ""
https = false

[llm]
# Provider and model groups are configured via the setup wizard (stored in SQLite).
# No defaults — setup must be completed first.

# ── Settings → Config defaults (per-profile, overridable in the UI) ──

[agent]
max_steps = 40
max_llm_retries = 2
reasoning_temperature = 1.0
reasoning_max_tokens = 32768
reasoning_retry = 3
steps_length = 80

[history]
max_tokens_total = 5000
max_tokens_per_message = 500

[skill_classifier]
temperature = 0.0
max_tokens = 64
retry = 2

[summarizer]
temperature = 0.3
max_tokens = 1024
retry = 2
