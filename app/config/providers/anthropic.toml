[provider]
name = "anthropic"
display_name = "Anthropic"

[[provider.auth_methods]]
id = "api_key"
label = "API Key"
hint = "Use your Anthropic API key"
instructions = "Get your API key at https://console.anthropic.com/settings/keys — sign in to the Anthropic Console and create a new API key."
kind = "api_key"
is_default = true

[provider.auth_methods.fields]
api_key = { description = "Anthropic API Key", type = "string", secret = true, required = true }

[[provider.auth_methods]]
id = "setup_token"
label = "Setup Token"
hint = "Use a setup/session token (Authorization: Bearer)"
instructions = "Paste your Anthropic setup-token. This is a bearer token for API access, distinct from a permanent API key. If you have the Claude CLI installed locally, using the API Key method is recommended instead. Setup tokens may have an expiration."
kind = "token"

[provider.auth_methods.fields]
setup_token = { description = "Setup Token", type = "string", secret = true, required = true }

