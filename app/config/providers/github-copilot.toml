[provider]
name = "github-copilot"
display_name = "GitHub Copilot"
base_url = "https://api.githubcopilot.com"

[[provider.auth_methods]]
id = "device_code"
label = "GitHub Device Login"
hint = "Browser device-code flow"
instructions = "This will open a GitHub device login to authorize Copilot. Requires an active GitHub Copilot subscription."
kind = "device_code"
is_default = true

[[provider.auth_methods]]
id = "api_key"
label = "GitHub Token"
hint = "Use an existing GitHub token"
instructions = "Paste a GitHub personal access token or Copilot token. You can also set COPILOT_GITHUB_TOKEN, GH_TOKEN, or GITHUB_TOKEN environment variables."
kind = "api_key"

[provider.auth_methods.fields]
api_key = { description = "GitHub Token", type = "string", secret = true, required = true }

