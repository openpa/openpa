[provider]
name = "openai"
display_name = "OpenAI"
requires_api_key = true

# Latest flagship models (GPT-5.4 series) - current frontier models
[[models]]
id = "gpt-5.4"
display_name = "GPT-5.4"
group_hint = "high"
input_price_per_1m = 2.50
output_price_per_1m = 15.00

[[models]]
id = "gpt-5.4-mini"
display_name = "GPT-5.4 Mini"
group_hint = "low"
input_price_per_1m = 0.75
output_price_per_1m = 4.50

[[models]]
id = "gpt-5.4-nano"
display_name = "GPT-5.4 Nano"
group_hint = "low"
input_price_per_1m = 0.20
output_price_per_1m = 1.25

[[models]]
id = "gpt-5.4-pro"
display_name = "GPT-5.4 Pro"
group_hint = "high"
input_price_per_1m = 30.00
output_price_per_1m = 180.00

# Previous-generation models still supported in the API (prices unchanged)
[[models]]
id = "gpt-4.1"
display_name = "GPT-4.1"
group_hint = "high"
input_price_per_1m = 2.00
output_price_per_1m = 8.00

[[models]]
id = "gpt-4.1-mini"
display_name = "GPT-4.1 Mini"
group_hint = "low"
input_price_per_1m = 0.40
output_price_per_1m = 1.60

[[models]]
id = "gpt-4.1-nano"
display_name = "GPT-4.1 Nano"
group_hint = "low"
input_price_per_1m = 0.10
output_price_per_1m = 0.40

[[models]]
id = "gpt-4o"
display_name = "GPT-4o"
group_hint = "high"
input_price_per_1m = 2.50
output_price_per_1m = 10.00

[[models]]
id = "gpt-4o-mini"
display_name = "GPT-4o Mini"
group_hint = "low"
input_price_per_1m = 0.15
output_price_per_1m = 0.60

# Reasoning models (o-series) - still fully supported with reasoning_effort parameter
[[models]]
id = "o3"
display_name = "o3"
group_hint = "high"
input_price_per_1m = 10.00
output_price_per_1m = 40.00
reasoning_effort = ["low", "medium", "high"]

[[models]]
id = "o3-mini"
display_name = "o3 Mini"
group_hint = "high"
input_price_per_1m = 1.10
output_price_per_1m = 4.40
reasoning_effort = ["low", "medium", "high"]

[[models]]
id = "o4-mini"
display_name = "o4 Mini"
group_hint = "high"
input_price_per_1m = 1.10
output_price_per_1m = 4.40
reasoning_effort = ["low", "medium", "high"]