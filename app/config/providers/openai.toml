[provider]
name = "openai"
display_name = "OpenAI"
requires_api_key = true

[[provider.auth_methods]]
id = "api_key"
label = "API Key"
hint = "Standard OpenAI API key"
instructions = "Get your API key at https://platform.openai.com/api-keys — sign in and create a new secret key."
kind = "api_key"
is_default = true

[provider.auth_methods.fields]
api_key = { description = "OpenAI API Key", type = "string", secret = true, required = true }

[[provider.auth_methods]]
id = "codex_oauth"
label = "Codex OAuth"
hint = "Paste OAuth access token from ChatGPT"
instructions = "Obtain an OAuth token by authenticating with ChatGPT via the Codex CLI or browser OAuth flow. Paste the access token here. Full browser-based OAuth integration is planned for a future release."
kind = "token"

[provider.auth_methods.fields]
oauth_token = { description = "OAuth Access Token", type = "string", secret = true, required = true }

