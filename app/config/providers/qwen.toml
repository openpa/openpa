[provider]
name = "qwen"
display_name = "Qwen Cloud"
base_url = "https://dashscope-intl.aliyuncs.com/compatible-mode/v1"

[[provider.auth_methods]]
id = "api_key"
label = "Standard API Key (Global)"
hint = "Endpoint: dashscope-intl.aliyuncs.com"
instructions = "Manage API keys: https://home.qwencloud.com/api-keys — Docs: https://docs.qwencloud.com/ — Uses the global endpoint at dashscope-intl.aliyuncs.com/compatible-mode/v1"
kind = "api_key"
is_default = true

[provider.auth_methods.fields]
api_key = { description = "Qwen Cloud API Key", type = "string", secret = true, required = true }

[[provider.auth_methods]]
id = "api_key_cn"
label = "Standard API Key (China)"
hint = "Endpoint: dashscope.aliyuncs.com"
instructions = "Manage API keys: https://home.qwencloud.com/api-keys — Docs: https://docs.qwencloud.com/ — Uses the China endpoint at dashscope.aliyuncs.com/compatible-mode/v1"
kind = "api_key"

[provider.auth_methods.fields]
api_key = { description = "Qwen Cloud API Key", type = "string", secret = true, required = true }

