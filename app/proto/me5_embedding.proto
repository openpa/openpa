syntax = "proto3";

package me5embedding;

message EmbeddingRequest {
    string text = 1;
}

message EmbeddingResponse {
    repeated float sentence_embeddings = 1;
}

service ME5EmbeddingService {
    rpc GetSentenceEmbeddingsMe5Large (EmbeddingRequest) returns (EmbeddingResponse);
    rpc GetSentenceEmbeddingsMe5Small (EmbeddingRequest) returns (EmbeddingResponse);
}