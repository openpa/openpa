# Backend test-release workflow.
#
# Trigger: push a tag matching ``v*-test*`` (e.g., ``v0.1.5-test1``).
# Unlike the prod ``release.yml`` workflow, this one:
#   1. Rewrites ``app/__version__.py`` in-place to a PEP 440 dev version
#      derived from the tag suffix (``v0.1.5-test1`` → ``0.1.5.dev1``).
#      The rewrite is in-CI only, never committed.
#   2. Builds the SPA + the wheel/sdist exactly like prod.
#   3. Publishes to **Test PyPI** (``test.pypi.org``), not production PyPI.
#   4. Uploads the dist as workflow artifacts so we can download and
#      inspect the exact bytes that went to Test PyPI.
#   5. Creates a GitHub Release marked ``prerelease: true`` so the
#      app's upgrader can discover new test builds via the Releases
#      API. ``/releases/latest`` filters out prereleases by default,
#      so prod hosts still only see the stable channel.
#   6. Builds openpa/openpa-desktop with OPENPA_PIP_SPEC=openpa==X.Y.Z.devN
#      pointing at Test PyPI and pushes it to Docker Hub. No ``:latest``
#      tag — test builds never claim that role.
#
# Required repo secrets:
#   TEST_PYPI_API_TOKEN  — created at https://test.pypi.org/manage/account/token/.
#                          Scoped to the openpa project once it exists,
#                          otherwise account-wide for the very first run.
#   DOCKERHUB_USERNAME   — Docker Hub account with push rights to
#                          openpa/openpa-desktop.
#   DOCKERHUB_TOKEN      — Docker Hub PAT (Read+Write scope).

name: release-test

on:
  push:
    tags:
      - "v*-test*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Test tag to release (e.g. v0.1.5-test1)"
        required: true
        type: string

jobs:
  wheel:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # needed for creating the GitHub prerelease
    outputs:
      tag: ${{ steps.tag.outputs.name }}
      version: ${{ steps.version.outputs.value }}

    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ -n "${{ github.event.inputs.tag }}" ]; then
            echo "name=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          fi

      - name: Check out openpa
        uses: actions/checkout@v4
        with:
          ref: ${{ steps.tag.outputs.name }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Map ``vMAJOR.MINOR.PATCH[.HOTFIX]-testN`` → ``MAJOR.MINOR.PATCH[.HOTFIX].devN``
      # and rewrite app/__version__.py so hatch picks it up. PEP 440 ``.devN``
      # is the canonical pre-release suffix; pip needs ``--pre`` to install
      # it, which the test installers pass.
      #
      # Guards:
      #   1. Tag must match the test-release pattern.
      #   2. The tag's base version (e.g. 0.1.8) must equal app/__version__.py
      #      as committed. Mismatch ⇒ refuse, so a stale source can never
      #      ship pre-releases with a different version number than the
      #      eventual prod tag will require.
      - name: Compute test version
        id: version
        env:
          TAG: ${{ steps.tag.outputs.name }}
        run: |
          python <<'PY'
          import os
          import re
          import sys

          tag = os.environ["TAG"]
          m = re.match(r"^v(\d+\.\d+\.\d+(?:\.\d+)?)-test(\d+)$", tag)
          if not m:
              sys.exit(
                  f"Tag {tag!r} does not match v<major>.<minor>.<patch>[.<hotfix>]-test<N>; "
                  "refusing to publish."
              )
          base, dev = m.group(1), m.group(2)
          version = f"{base}.dev{dev}"

          path = "app/__version__.py"
          src = open(path).read()

          src_m = re.search(r'^__version__\s*=\s*"([^"]+)"', src, re.M)
          if not src_m:
              sys.exit(f"Could not find __version__ in {path}")
          src_version = src_m.group(1)
          if src_version != base:
              sys.exit(
                  f"Tag {tag!r} implies version {base!r} but app/__version__.py "
                  f"is {src_version!r}. Bump app/__version__.py to {base} on main "
                  "and retag."
              )

          new = re.sub(
              r'^__version__\s*=\s*"[^"]*"',
              f'__version__ = "{version}"',
              src,
              count=1,
              flags=re.M,
          )
          if new == src:
              sys.exit(f"Failed to rewrite __version__ in {path}")
          open(path, "w").write(new)
          print(f"Rewrote __version__ → {version}")

          with open(os.environ["GITHUB_OUTPUT"], "a") as fh:
              fh.write(f"value={version}\n")
          PY

      # Same SPA build step as prod: build the in-tree ui/ into
      # app/static/ui/ so the wheel ships with the UI bundled.
      - name: Build SPA
        run: bash scripts/build_ui.sh

      - name: Install hatch
        run: pip install --upgrade hatch

      - name: Build wheel + sdist
        run: hatch build

      # Catch the class of bug where a Python subpackage is accidentally
      # gitignored out of the wheel: install the freshly built wheel into
      # a throwaway venv and import the modules the CLI actually loads.
      # If anything is missing this fails the release before publish.
      - name: Smoke-test built wheel
        run: |
          python -m venv /tmp/smoke
          . /tmp/smoke/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          python -c "import app, app.storage, app.storage.migrations"
          openpa --help >/dev/null

      - name: Publish to Test PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
          password: ${{ secrets.TEST_PYPI_API_TOKEN }}
          skip-existing: true

      # Saves the dist on the workflow run page so testers can download
      # the exact wheel/sdist that hit Test PyPI without going through pip.
      - name: Upload dist artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openpa-${{ steps.version.outputs.value }}-dist
          path: dist/
          if-no-files-found: error
          retention-days: 30

      # Publish a GitHub prerelease at the original ``v*-testN`` tag so
      # the app's upgrader can find it via ``/releases``. The wheel/sdist
      # are attached for inspection. ``prerelease: true`` keeps these
      # entries out of the default Releases listing seen by prod hosts.
      - name: Create GitHub prerelease
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.name }}
          name: ${{ steps.tag.outputs.name }}
          prerelease: true
          generate_release_notes: true
          files: |
            dist/*.whl
            dist/*.tar.gz

  # Builds the per-platform Electron installers and uploads them to the
  # GitHub prerelease the ``wheel`` job created. Mirrors release.yml's
  # ``electron`` job with two test-specific differences:
  #
  #   1. Uses ``npm run build:test`` instead of ``npm run build``. That
  #      script invokes vite with --mode test (so __OPENPA_INSTALL_CHANNEL__
  #      is baked in as 'test', which makes setupAutoUpdater point
  #      electron-updater at latest-test.yml on the installed app) and
  #      passes ``--config electron-builder.test.json5`` so the publish
  #      block uploads to a prerelease with ``channel: test`` — keeping
  #      test artifacts out of the production ``latest.yml`` feed.
  #
  #   2. The wheel job's app/__version__.py rewrite happened on a
  #      different runner. Each matrix runner here has a fresh checkout
  #      without that mutation, so the rewrite is reapplied locally —
  #      same shape as the ``docker`` job below. The new version flows
  #      through scripts/sync_ui_version.py (the ui prebuild hook) into
  #      ui/package.json so the installer filename and the latest-test.yml
  #      metadata both carry 0.1.9.devN.
  #
  # Existing prod-channel users won't auto-update onto this stream — their
  # installer baked INSTALL_CHANNEL=production at build time. They have
  # to download a test installer from this prerelease once to switch.
  # After that, electron-updater on their installed app sees every
  # subsequent test release through latest-test.yml.
  electron:
    needs: wheel
    strategy:
      # ``fail-fast: false`` keeps a Linux build from being discarded
      # because (say) macOS notarization hit a transient hiccup. We want
      # every successful platform's artifacts on the prerelease.
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    permissions:
      contents: write
    defaults:
      run:
        working-directory: ui
    steps:
      - name: Check out openpa
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.wheel.outputs.tag }}

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      - name: Set up Python 3.13 (for prebuild version sync)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      # Windows runners default Python to cp1252 stdout encoding, which
      # crashes on the Unicode arrow this script used to print. ASCII-only
      # is the simplest fix — the message is just diagnostic.
      - name: Rewrite app/__version__.py to ${{ needs.wheel.outputs.version }}
        working-directory: ${{ github.workspace }}
        shell: bash
        env:
          NEW_VERSION: ${{ needs.wheel.outputs.version }}
        run: |
          python <<'PY'
          import os, re
          new = os.environ["NEW_VERSION"]
          path = "app/__version__.py"
          src = open(path).read()
          out = re.sub(
              r'^__version__\s*=\s*"[^"]*"',
              f'__version__ = "{new}"',
              src,
              count=1,
              flags=re.M,
          )
          if out == src:
              raise SystemExit(f"Failed to rewrite __version__ in {path}")
          open(path, "w").write(out)
          print(f"Rewrote __version__ -> {new}")
          PY

      - name: Install dependencies
        run: npm ci

      # Workaround for npm bug #4828: optionalDependencies (the
      # platform-specific @rollup/rollup-* binaries) are not recorded in
      # a package-lock.json generated on a single OS. The lockfile here
      # was created on Windows, so Linux/macOS runners must install
      # their binary explicitly. --no-save / --no-package-lock keep both
      # files untouched.
      - name: Install platform Rollup binary (workaround npm#4828)
        shell: bash
        run: |
          case "${{ matrix.os }}" in
            ubuntu-latest)  pkg="@rollup/rollup-linux-x64-gnu" ;;
            macos-latest)   pkg="@rollup/rollup-darwin-arm64" ;;
            windows-latest) exit 0 ;;
          esac
          npm install --no-save --no-package-lock "$pkg"

      # Build the installer locally — do not let electron-builder publish.
      # Reason: sync_ui_version.py converts the wheel's PEP 440 ``.devN``
      # form to semver ``-dev.N`` for ui/package.json (npm refuses dot-
      # before-dev as a prerelease identifier). That makes electron-
      # builder derive a publish tag of ``v0.1.9-dev.N`` — different from
      # the wheel job's actual prerelease at ``v0.1.9-testN``. Letting
      # electron-builder publish either creates a second orphan release
      # at the semver tag (best case), or 422s on the second matrix runner
      # racing to create it (what happened on test20). Decoupling the
      # publish below means electron-builder only builds, and we put the
      # artifacts where they belong using ``gh release upload``.
      - name: Build (test channel, no publish)
        run: npm run build:test -- --publish never

      # Upload the installer + the channel update manifest to the same
      # prerelease the wheel job already created. electron-updater
      # resolves asset URLs in ``latest-test*.yml`` relative to the
      # release the yml itself lives in, so the tag-name mismatch
      # between ``v0.1.9-testN`` and the version baked into filenames
      # (``0.1.9-dev.N``) is invisible to it.
      #
      # Globs:
      #   - ``release/*/OpenPA*.*`` catches every installer
      #     (.AppImage / .dmg / .exe) and the matching .blockmap files
      #     electron-updater uses for differential downloads.
      #   - ``release/*/latest*.yml`` catches just the update manifests
      #     (skips ``builder-effective-config.yaml`` and the like).
      # ``--clobber`` makes re-runs idempotent.
      - name: Upload Electron installers to GH prerelease
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ needs.wheel.outputs.tag }}
        run: |
          shopt -s nullglob
          files=( release/*/OpenPA*.* release/*/latest*.yml )
          if [ ${#files[@]} -eq 0 ]; then
            echo "::error::No installer artifacts found under release/*/"
            ls -la release/ || true
            exit 1
          fi
          printf 'uploading: %s\n' "${files[@]}"
          gh release upload "$TAG" "${files[@]}" \
            --repo "${{ github.repository }}" \
            --clobber

  # Builds openpa/openpa-desktop:X.Y.Z.devN against Test PyPI and pushes
  # it to Docker Hub. Mirrors release.yml's ``docker`` job; differences:
  #   - Pulls the wheel from Test PyPI (with prod PyPI as fallback index
  #     for transitive deps that only exist there).
  #   - Tag is the rewritten PEP 440 form (0.1.5.dev3), not the GH tag
  #     (v0.1.5-test3).
  #   - Does NOT emit ``:latest``.
  #
  # The wheel job's version rewrite happened on a different runner, so
  # this job's clean checkout has the un-rewritten app/__version__.py.
  # We re-apply the rewrite before the build because Dockerfile.desktop's
  # SPA stage copies app/__version__.py + sync_ui_version.py to bake the
  # version into the UI bundle. Without the rewrite, the wheel from Test
  # PyPI (0.1.5.dev3) and the UI (0.1.5) would disagree.
  #
  # cache scope=desktop is shared with release.yml, so a prod or prior
  # test build's base layers are reused.
  docker:
    needs: wheel
    runs-on: ubuntu-latest
    steps:
      - name: Check out openpa
        uses: actions/checkout@v4
        with:
          ref: ${{ needs.wheel.outputs.tag }}

      - name: Set up Python 3.13 (for version rewrite)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Rewrite app/__version__.py to ${{ needs.wheel.outputs.version }}
        env:
          NEW_VERSION: ${{ needs.wheel.outputs.version }}
        run: |
          python <<'PY'
          import os, re
          new = os.environ["NEW_VERSION"]
          path = "app/__version__.py"
          src = open(path).read()
          out = re.sub(
              r'^__version__\s*=\s*"[^"]*"',
              f'__version__ = "{new}"',
              src,
              count=1,
              flags=re.M,
          )
          if out == src:
              raise SystemExit(f"Failed to rewrite __version__ in {path}")
          open(path, "w").write(out)
          print(f"Rewrote __version__ → {new}")
          PY

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # Test PyPI serves the JSON API (``/pypi/<pkg>/<ver>/json``) and the
      # simple index (``/simple/<pkg>/``) from separate cache paths on
      # Fastly; the JSON API can refresh ahead of the simple index. The
      # next step reads the wheel URL from the simple index, so polling
      # the JSON API previously gave false-positive readiness signals
      # (v0.1.9-test3 hit exactly this — wheel published, JSON API
      # ready, but the simple index didn't list it yet, so the resolve
      # step failed). Poll the simple index directly so its readiness
      # is the same readiness the next step needs.
      - name: Wait for Test PyPI simple index to list openpa==${{ needs.wheel.outputs.version }}
        env:
          VERSION: ${{ needs.wheel.outputs.version }}
        run: |
          for i in $(seq 1 60); do
            if curl -fsSL https://test.pypi.org/simple/openpa/ \
                | grep -qE "openpa-${VERSION}-py3-none-any\.whl"; then
              echo "Test PyPI simple index lists openpa-${VERSION}"
              exit 0
            fi
            echo "Not yet ($i/60); sleeping 5s"
            sleep 5
          done
          echo "::error::Test PyPI simple index never listed openpa-${VERSION} after 300s"
          exit 1

      # Resolve the openpa wheel to a direct URL so pip installs it without
      # consulting Test PyPI as a resolver. Test PyPI is a public free-for-all
      # polluted with broken stubs (e.g. ``FASTAPI-1.0.tar.gz``, a 2.5 KB
      # setup.py with a missing ``DESCRIPTION.txt`` that satisfies
      # ``fastapi>=0.115.2`` and crashes the setuptools build) and stale
      # pre-releases (``httpx-1.0.dev3`` outranking prod's stable 0.28 once
      # ``--pre`` is on). Pinning openpa by URL sidesteps both: pip pulls the
      # wheel directly and resolves all transitive deps from default PyPI.
      # Same pattern install/install.sh uses for the native test installer.
      - name: Resolve Test PyPI wheel URL for openpa==${{ needs.wheel.outputs.version }}
        id: wheel_url
        env:
          VERSION: ${{ needs.wheel.outputs.version }}
        run: |
          URL=$(curl -fsSL https://test.pypi.org/simple/openpa/ \
            | grep -oE "https://[^\"]*openpa-${VERSION}-py3-none-any\.whl" \
            | head -n 1)
          if [ -z "$URL" ]; then
            echo "::error::No wheel for openpa==${VERSION} on Test PyPI"
            exit 1
          fi
          echo "Resolved: $URL"
          echo "url=$URL" >> "$GITHUB_OUTPUT"

      - name: Build & push openpa/openpa-desktop (test)
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.desktop
          platforms: linux/amd64
          push: true
          provenance: false
          tags: openpa/openpa-desktop:${{ needs.wheel.outputs.version }}
          build-args: |
            OPENPA_PIP_SPEC=${{ steps.wheel_url.outputs.url }}
          cache-from: type=gha,scope=desktop
          cache-to: type=gha,scope=desktop,mode=max
