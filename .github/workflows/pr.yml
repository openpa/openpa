# Pull-request CI for the merged openpa repo.
#
# Two parallel jobs verify that backend changes don't break the wheel
# and UI changes don't break the SPA bundle. Neither builds an Electron
# installer — that path is exercised only by the release workflow on tag
# push, since matrix Electron builds are slow and code-signing secrets
# aren't available to fork PRs anyway.

name: pr

on:
  pull_request:
    branches: [main]

jobs:
  backend:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install uv
        uses: astral-sh/setup-uv@v3

      - name: Install dependencies
        run: uv sync --all-groups

      # ``--ignore=tests/upgrade`` lets the suite stay green while the
      # upgrade fixture matures; drop the flag once those tests are
      # stable. Remove this comment along with the flag.
      - name: Run pytest
        run: uv run pytest

  ui:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ui
    steps:
      - uses: actions/checkout@v4

      - name: Set up Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: ui/package-lock.json

      # ui/package.json's prebuild hook shells out to
      # ``python ../scripts/sync_ui_version.py``, so Python must be on PATH.
      - name: Set up Python 3.13 (for prebuild version sync)
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install dependencies
        run: npm ci

      # Linux runner is missing the @rollup/rollup-linux-x64-gnu optional
      # binary because the lockfile was generated on Windows (npm#4828).
      - name: Install Linux Rollup binary (workaround npm#4828)
        run: npm install --no-save --no-package-lock @rollup/rollup-linux-x64-gnu

      - name: Sync version from backend
        run: npm run version:sync

      - name: Type-check
        run: npx vue-tsc --noEmit

      # Smoke-build the web bundle. Doesn't run Electron build — that's
      # release-only because the matrix is slow and Electron signing
      # secrets aren't available to forks.
      - name: Smoke build (web)
        run: npm run web:build
